# Publishes the Vite build to GitHub Pages.
# After pushing: Repo → Settings → Pages → Source: GitHub Actions
#
# Vault / Cat API: add REPOSITORY secret VITE_VAULT_KEY (and VITE_CAT_API_KEY) at
# Settings → Secrets and variables → Actions → Repository secrets
# Name must be exactly VITE_VAULT_KEY (VITE_ prefix required).
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # No `environment:` here — use **Repository secrets** only (what you have in the screenshot).
  # Putting `environment: github-pages` on the build job can require approvals or confuse env vs repo secrets.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set VITE_BASE_PATH
        run: |
          BASE="${{ vars.VITE_BASE_PATH }}"
          if [ -z "$BASE" ]; then BASE="/${{ github.event.repository.name }}/"; fi
          echo "VITE_BASE_PATH=$BASE" >> "$GITHUB_ENV"

      - run: npm ci

      # Vite reads .env.production during `vite build`; avoids env not reaching the Node process.
      - name: Write .env.production for build
        env:
          VITE_VAULT_KEY: ${{ secrets.VITE_VAULT_KEY }}
          VITE_CAT_API_KEY: ${{ secrets.VITE_CAT_API_KEY }}
        run: |
          rm -f .env.production
          if [ -z "$VITE_VAULT_KEY" ]; then
            echo "::warning::Secret VITE_VAULT_KEY is empty or missing. Add it under Settings → Secrets and variables → Actions (Repository secrets), exact name: VITE_VAULT_KEY"
          else
            printf 'VITE_VAULT_KEY=%s\n' "$VITE_VAULT_KEY" >> .env.production
            echo "VITE_VAULT_KEY is present for build (value not shown)."
          fi
          if [ -n "$VITE_CAT_API_KEY" ]; then
            printf 'VITE_CAT_API_KEY=%s\n' "$VITE_CAT_API_KEY" >> .env.production
          fi

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ env.VITE_BASE_PATH }}
          VITE_CAT_API_KEY: ${{ secrets.VITE_CAT_API_KEY }}
          VITE_VAULT_KEY: ${{ secrets.VITE_VAULT_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
