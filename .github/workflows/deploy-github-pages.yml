# GitHub Pages deploy. Secrets: Settings → Secrets and variables → Actions → Repository secrets
# Names: VITE_VAULT_KEY, VITE_CAT_API_KEY (exact, with VITE_ prefix).
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Job-level env: guarantees child processes (npm → vite) inherit these.
    env:
      VITE_VAULT_KEY: ${{ secrets.VITE_VAULT_KEY }}
      VITE_CAT_API_KEY: ${{ secrets.VITE_CAT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set VITE_BASE_PATH
        run: |
          BASE="${{ vars.VITE_BASE_PATH }}"
          if [ -z "$BASE" ]; then BASE="/${{ github.event.repository.name }}/"; fi
          echo "VITE_BASE_PATH=$BASE" >> "$GITHUB_ENV"

      - run: npm ci

      # Vite ignores .env* files that are listed in .gitignore; this filename is not.
      - name: Write vite.github.env for Vite (CI only)
        run: |
          rm -f vite.github.env
          if [ -n "$VITE_VAULT_KEY" ]; then
            printf 'VITE_VAULT_KEY=%s\n' "$VITE_VAULT_KEY" >> vite.github.env
          fi
          if [ -n "$VITE_CAT_API_KEY" ]; then
            printf 'VITE_CAT_API_KEY=%s\n' "$VITE_CAT_API_KEY" >> vite.github.env
          fi
          echo "### Build env (lengths only, not values)" >> "$GITHUB_STEP_SUMMARY"
          echo "- VITE_VAULT_KEY length: ${#VITE_VAULT_KEY}" >> "$GITHUB_STEP_SUMMARY"
          echo "- VITE_CAT_API_KEY length: ${#VITE_CAT_API_KEY}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${#VITE_VAULT_KEY}" -eq 0 ]; then
            echo "::warning::VITE_VAULT_KEY is empty. Check Repository secrets on THIS repo (forks: add secrets on the fork). Re-run after fixing."
          fi

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
